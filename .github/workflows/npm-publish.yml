# This workflow will run tests using node and then publish a package to GitHub Packages when a release is created
# For more information see: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages

name: publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      check_only:
        description: "Run release checks/build only (skip publish)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20.x"
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - name: Run workspace release
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.check_only }}" == "true" ]]; then
            npm run release:ws -- --check-only
          else
            npm run release:ws
          fi
        env:
          NODE_AUTH_TOKEN: ${{secrets.NPM_TOKEN }}
